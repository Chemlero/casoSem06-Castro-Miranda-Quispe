<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reportes</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div id="sidebar"></div>
    <div class="main">
        <h2>Reportes</h2>

        <h3>Exportación</h3>
        <div>
            <a href="/api/export/excel" class="button">Exportar a Excel</a>
            <a href="/api/export/csv" class="button">Exportar a CSV</a>
        </div>

        <h3>Visitas por día</h3>
        <div>
            <input type="date" id="fechaReporte">
            <button id="btnReporteDia">Generar</button>
        </div>
        <div id="reporteDia"></div>

        <h3>Visitas por despacho</h3>
        <div>
            <input type="text" id="despachoReporte" placeholder="Nombre despacho">
            <button id="btnReporteDespacho">Generar</button>
        </div>
        <div id="reporteDespacho"></div>

        <h3>Tiempo promedio de permanencia</h3>
        <div id="tiempoPromedio"></div>
    </div>
    <script src="/js/sidebar.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
