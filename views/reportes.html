<!DOCTYPE html>
<html lang="es">

    <title>Reportes</title>

</head>

<div class="main">
    <h2>Reportes</h2>

    <h3>Exportación</h3>

    <button>Generar</button>
    <div id="reporteDespacho"></div>

    <h3>Tiempo promedio de permanencia</h3>
    <div id="tiempoPromedio"></div>
</div>

<script src="/js/sidebar.js"></script>
